# Nixpacks Configuration for Railway Workers

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x", "openssl"]

[variables]
NODE_VERSION = "22"

[phases.install]
cmds = ["rm -rf node_modules/.cache", "npm ci --legacy-peer-deps"]

[phases.build]
cmds = ["echo 'Workers dont need build'"]

[start]
cmd = "npm run worker"
