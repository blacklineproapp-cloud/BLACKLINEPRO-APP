# Nixpacks Configuration for Railway Workers

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x", "openssl"]

[variables]
NODE_VERSION = "22"

[phases.install]
cmds = ["npm ci --legacy-peer-deps --cache /tmp/.npm"]

[phases.build]
cmds = ["echo 'Workers dont need build'"]

[start]
cmd = "npm run worker"
